name: Submodule Bump Gate

# S77 P2 Pass A — Parent-repo CI gate.
# Validates every commit to main that touches the `Game/founding-realm`
# submodule pointer:
#   1. The new submodule SHA is pushed to origin/master (not a dangling local)
#   2. The submodule source builds cleanly at that SHA (tsc + tests + bundle)
#
# This prevents the classic "submodule bump race" where parent commits
# a submodule pointer that isn't pushed to the submodule remote — leaving
# any fresh clone unable to fetch the commit.

on:
  push:
    branches: [main]
    paths:
      - 'Game/founding-realm'
  pull_request:
    branches: [main]
    paths:
      - 'Game/founding-realm'
  workflow_dispatch:

concurrency:
  group: submodule-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-pushed:
    name: Submodule SHA is pushed to origin
    runs-on: ubuntu-latest
    timeout-minutes: 3

    outputs:
      submodule_sha: ${{ steps.get-sha.outputs.sha }}

    steps:
      - name: Checkout parent (submodules shallow)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Read submodule SHA from parent index
        id: get-sha
        run: |
          # git ls-tree shows the recorded commit for the submodule
          SHA=$(git ls-tree HEAD Game/founding-realm | awk '{print $3}')
          if [ -z "$SHA" ]; then
            echo "::error::Could not read submodule SHA from parent index"
            exit 1
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Submodule SHA in parent: $SHA"

      - name: Verify SHA exists on founding-realm origin/master
        run: |
          SHA="${{ steps.get-sha.outputs.sha }}"
          # Check if the SHA is reachable from origin/master of the submodule repo
          git ls-remote https://github.com/daneshto-dotcom/founding-realm.git refs/heads/master | awk '{print $1}' > master-head.txt
          MASTER_HEAD=$(cat master-head.txt)
          echo "founding-realm origin/master HEAD: $MASTER_HEAD"

          # Clone shallow + deepen to check if SHA is in history
          git clone --filter=blob:none --no-checkout https://github.com/daneshto-dotcom/founding-realm.git /tmp/fr-check
          cd /tmp/fr-check
          if git cat-file -e "$SHA" 2>/dev/null; then
            echo "✓ SHA $SHA exists in founding-realm origin"
          else
            # SHA might be older — fetch full history to confirm
            git fetch --unshallow origin 2>/dev/null || git fetch --depth=1000 origin
            if git cat-file -e "$SHA" 2>/dev/null; then
              echo "✓ SHA $SHA found after deeper fetch"
            else
              echo "::error::Submodule SHA $SHA NOT found in founding-realm origin. Did you forget to push the submodule?"
              exit 1
            fi
          fi

  build-at-sha:
    name: Submodule builds + tests pass at SHA
    needs: verify-pushed
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout submodule at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: daneshto-dotcom/founding-realm
          ref: ${{ needs.verify-pushed.outputs.submodule_sha }}
          path: founding-realm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: founding-realm/package-lock.json

      - name: Install canvas native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: cd founding-realm && npm ci

      - name: Typecheck
        run: cd founding-realm && npx tsc --noEmit

      - name: Run simulation tests
        run: cd founding-realm && npm test

      - name: Bundle check
        run: cd founding-realm && node scripts/bundle-check.js

      - name: Audit check
        run: cd founding-realm && node scripts/audit-check.js
